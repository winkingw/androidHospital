name: PR File Check

on:
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Forbidden Files
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          error_count=0

          while IFS= read -r file; do
            case "$file" in
              *.class | *.apk | *.aab | *.ap_ | *.dex)
                echo "::error::禁止提交编译产物: $file"
                error_count=$((error_count + 1)) ;;
              build/* | */build/*)
                echo "::error::禁止提交 build/ 目录: $file"
                error_count=$((error_count + 1)) ;;
              .idea/* | */\.idea/*)
                echo "::error::禁止提交 IDE 配置 .idea/: $file"
                error_count=$((error_count + 1)) ;;
              *.iml | *.ipr | *.iws)
                echo "::error::禁止提交 IDE 模块文件: $file"
                error_count=$((error_count + 1)) ;;
              local.properties)
                echo "::error::禁止提交 local.properties（含本机 SDK 路径）"
                error_count=$((error_count + 1)) ;;
              *.jks | *.keystore)
                echo "::error::禁止提交签名密钥文件: $file"
                error_count=$((error_count + 1)) ;;
              *.log)
                echo "::error::禁止提交日志文件: $file"
                error_count=$((error_count + 1)) ;;
            esac
          done < <(git diff --name-only "$base_sha...$head_sha")

          if [ "$error_count" -gt 0 ]; then
            echo "::error::发现 $error_count 个不应提交的文件，请清理后重新推送"
            exit 1
          fi
          echo "✅ 未发现禁止提交的文件"

      - name: Check Module Boundaries
        run: |
          branch="${{ github.event.pull_request.head.ref }}"
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          # 组长分支不限制
          if [ "$branch" = "feature/01-home" ]; then
            echo "✅ 组长分支，无公共模块限制"
            exit 0
          fi

          warning_count=0
          while IFS= read -r file; do
            case "$file" in
              app/src/main/java/com/serenehealth/bean/* | \
              app/src/main/java/com/serenehealth/db/* | \
              app/src/main/java/com/serenehealth/util/*)
                echo "::warning::非组长分支修改了公共模块: $file"
                echo "公共模块（bean/、db/、util/）通常由组长维护，请确认本次修改是否必要"
                warning_count=$((warning_count + 1)) ;;
            esac
          done < <(git diff --name-only "$base_sha...$head_sha")

          if [ "$warning_count" -gt 0 ]; then
            echo "::warning::共 $warning_count 个公共模块文件被修改，请组长 review 时重点检查"
          else
            echo "✅ 模块边界检查通过"
          fi
