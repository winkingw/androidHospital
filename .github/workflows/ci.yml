name: Android CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 第一步：检测本次提交是否包含需要编译的代码
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has-code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/src/**'
              - 'app/build.gradle.kts'
              - 'build.gradle.kts'
              - 'gradle/**'
              - 'settings.gradle.kts'
              - 'gradle.properties'

  # 第二步：只有检测到代码变更时才编译
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml', '**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Run Lint
        continue-on-error: true
        run: ./gradlew lint

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results*.html
          retention-days: 7

  # 纯文档/配置提交：跳过编译
  skip-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has-code == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ 本次提交仅含文档或配置文件，跳过编译检查"
